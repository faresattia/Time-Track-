<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title> Time Track </title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="container">
    <h1> Time Track </h1>
    
    <form id="mainForm">
      <label>Name:</label>
      <input type="text" name="name" placeholder="Name" />
      
      <label>Number of lectures (per week):</label>
      <input type="number" id="lec_count" name="lec_count" value="0" min="0" />

      <div id="lectures_container"></div>

      <h3>Hobbies (separated by comma ","):</h3>
      <input type="text" name="interests" placeholder="EX: sport, reading, coding" />

      <h3>Preferences</h3>
      <label>Maximum study hours:</label>
      <input type="number" name="max_study_per_day" value="4" step="0.5" />
      
      <label>Session hours:</label>
      <input type="number" name="preferred_block" value="1.0" step="0.5" />

      <button type="submit">Generate Schedule</button> 
    </form>
  </div>

  <div class="chat-widget-container">
      <div class="chat-window" id="chatWindow">
          <div class="chat-header">
              <span>مساعدك الذكي</span>
              <button type="button" class="close-btn" id="closeChat">×</button>
          </div>
          
          <div class="chat-body" id="chatBody">
              <div class="message bot">
                  مرحباً! أنا المساعد الذكي الخاص بك. كيف يمكنني مساعدتك اليوم؟
              </div>
          </div>

          <div class="chat-input-area">
              <input type="text" id="userInput" placeholder="اكتب رسالتك هنا...">
              <button type="button" id="sendBtn">إرسال</button>
          </div>
      </div>

      <button type="button" class="chat-trigger-btn" id="chatTrigger">
          💬
      </button>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
