<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title> Time Track </title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1> Time Track </h1>
    <form id="mainForm">
      <label>name:</label>
      <input type="text" name="name" placeholder="name" />

      
      <label> numper of lucter (per week): </label>
      <input type="number" id="lec_count" name="lec_count" value="0" min="0" />

      <div id="lectures_container">
      </div>
      <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Track Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-content">
        <h1>مرحباً بك في مشروع Time Track</h1>
        <p>استخدم الشات بوت في الزاوية للسؤال عن جدولك.</p>
    </div>

    <div class="chat-widget-container">
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <span>مساعد جامعة الدلتا</span>
                <button class="close-btn" id="closeChat">×</button>
            </div>
            
            <div class="chat-body" id="chatBody">
                <div class="message bot">
                    مرحباً! أنا المساعد الذكي الخاص بك. كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="اكتب رسالتك هنا...">
                <button id="sendBtn">إرسال</button>
            </div>
        </div>

        <button class="chat-trigger-btn" id="chatTrigger">
            💬
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>

      <!-- <h3>خطة المذاكرة (المواد وساعات الأسبوع)</h3>

      <h3>hobis "with cuma (,)":</h3>
      <input type="text" name="interests" placeholder="EXG..: sport, reading, coding" />

      <h3>Preferences</h3>
      <label>maximum study hours:</label>
      <input type="number" name="max_study_per_day" value="4" step="0.5" />
      <label>session hours:</label>
      <input type="number" name="preferred_block" value="1.0" step="0.5" />

      <button type="submit"> genrate schdule </button>
    </form>
  </div>

   <script src="/static/script.js"></script>
</body>
</html>
